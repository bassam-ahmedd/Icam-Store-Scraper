name: icamstore daily scrape

on:
  schedule:
    # Twice daily at 05:30 and 17:30 Africa/Cairo. GitHub cron is UTC with no DST
    # awareness, so both the summer (EEST, UTC+3) and winter (EET, UTC+2) UTC times
    # are listed; the script's Cairo-time guard runs only the correct two each day.
    - cron: "30 2 * * *"     # 05:30 Cairo in summer (EEST)
    - cron: "30 3 * * *"     # 05:30 Cairo in winter (EET)
    - cron: "30 14 * * *"    # 17:30 Cairo in summer (EEST)
    - cron: "30 15 * * *"    # 17:30 Cairo in winter (EET)
  workflow_dispatch: {}   # lets you trigger a manual run from the Actions tab

concurrency:
  group: icamstore-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ZENROWS_API_KEY:   ${{ secrets.ZENROWS_API_KEY }}
          SHEET_ID:          ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          PROXY_COUNTRY:     ae
        run: python icamstore_scraper.py

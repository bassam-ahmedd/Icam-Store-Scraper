name: Icam Store Scraper

on:
  schedule:
    # 06:00 UTC == 10:00 Asia/Dubai (UTC+4, no DST).
    # Note: GitHub's scheduler can start a few minutes late under load.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # lets you trigger a manual run from the Actions tab

concurrency:
  group: icamstore-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ZENROWS_API_KEY:   ${{ secrets.ZENROWS_API_KEY }}
          SHEET_ID:          ${{ secrets.SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          PROXY_COUNTRY:     ae
        run: python icamstore_scraper.py
